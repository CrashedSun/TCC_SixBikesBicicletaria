<!DOCTYPE html>
<html lang="pt-BR">

    <style>
        body {
            background: #f4fdf4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #7ed957;
            color: #fff;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 25px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px 12px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #6acb4a;
            transform: translateX(4px);
        }

        .content {
            margin-left: 260px;
            padding: 25px;
        }

        .card {
            border-radius: 18px;
            background: #ffffff;
            border: none;
            padding: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        input.form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #d7d7d7;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #7ed957 !important;
            color: #fff;
        }

        .logout-btn {
            background:#ff4d4d;
            margin-top:50px;
            font-weight:bold;
            text-align:center;
        }

        .logout-btn:hover {
            background:#e64545 !important;
        }
    </style>
</head>

<div class="sidebar">

    <!-- ⭐ NOME DO USUÁRIO LOGADO -->

    <h3 class="text-center mb-4">BICICLETARIA</h3>

    <!-- MENU -->
    <a href="#" onclick="loadPage('dashboard')">📊 Dashboard</a>
    <a href="#" onclick="loadPage('estoque')">📦 Estoque</a>

<div class="content">

/* ======================================================================
   SISTEMA DE LOGIN (EXIBE "Olá, Fulano")
   ====================================================================== */

// Quando o sistema real existir,
// basta salvar o nome: localStorage.setItem("usuario", nomeLogado);

if (!localStorage.getItem("usuario")) {
    localStorage.setItem("usuario", "Fulano");
}

document.getElementById("userName").textContent =
    "Olá, " + localStorage.getItem("usuario");

/* ======================================================================
   FUNÇÃO DE LOGOUT
   ====================================================================== */
function logout() {
    const confirmar = confirm("Tem certeza que deseja sair do sistema?");

    if (confirmar) {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
    }
}

                            </div>

                            <div class="mb-2">
                                <label class="form-label">Cargo</label>
                                <select class="form-select" id="funcCargo">
                                    <option value="">Selecione...</option>
                                    <option>Gerente</option>
                                    <option>Mecânico</option>
                                    <option>Atendente</option>
                                </select>
                            </div>

                            <div class="mb-2">
                                <label class="form-label">Senha</label>
                                <input type="password" class="form-control">
                            </div>

                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-warning px-4">🔍 Pesquisar</button>
                            <button class="btn btn-success px-4">💾 Salvar</button>
                            <button class="btn btn-danger px-4">🗑 Excluir</button>
                            <button class="btn btn-secondary px-4" data-bs-dismiss="modal">Fechar</button>
                        </div>

                    </div>
                </div>
            </div>
        `;

        const modal = new bootstrap.Modal(document.getElementById("modalFuncionarios"));
        document.getElementById("openFuncionariosModal").addEventListener("click", () => {
            modal.show();
        });

        const search = document.getElementById("funcSearch");
        const filtro = document.getElementById("funcFiltro");
        const linhas = document.querySelectorAll("#funcionariosTable tr");

        search.addEventListener("keyup", () => {
            let texto = search.value.toLowerCase().replace(/[.\-]/g, ""); 
            const coluna = filtro.value;

            linhas.forEach(tr => {
                const celula = tr.querySelector(`[data-col="${coluna}"]`);

                if (celula) {
                    let valor = celula.textContent.toLowerCase().replace(/[.\-]/g, "");
                    tr.style.display = valor.includes(texto) ? "" : "none";
                }
            });
        });
    }
}

loadPage('dashboard');
</script>
