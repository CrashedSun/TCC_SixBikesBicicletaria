<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecanico - Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f4fdf4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #7ed957;
            color: #fff;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 25px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px 12px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #6acb4a;
            transform: translateX(4px);
        }

        .content {
            margin-left: 260px;
            padding: 25px;
        }

        .card {
            border-radius: 18px;
            background: #ffffff;
            border: none;
            padding: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        input.form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #d7d7d7;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #7ed957 !important;
            color: #fff;
        }

        .logout-btn {
            background:#ff4d4d;
            margin-top:50px;
            font-weight:bold;
            text-align:center;
        }

        .logout-btn:hover {
            background:#e64545 !important;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <!-- ? NOME DO USUÁRIO LOGADO -->
    <h5 id="userName" class="text-center fw-bold mb-2"></h5>

    <h3 class="text-center mb-4">BICICLETARIA</h3>

    <!-- MENU -->
    <a href="#" onclick="loadPage('dashboard')">Dashboard</a>
    <a href="#" onclick="loadPage('estoque')">Estoque</a>
    <a href="#" onclick="loadPage('agendamentos')">Agendamentos</a>

    <!-- ? BOT?fO LOGOUT -->
    <a href="#" class="logout-btn" onclick="logout()">Sair</a>
</div>

<div class="content">
    <div id="main-content"></div>
</div>

<script>
/* ======================================================================
   SISTEMA DE LOGIN (EXIBE "Olá, Fulano")
   ====================================================================== */

// Quando o sistema real existir,
// basta salvar o nome: localStorage.setItem("usuario", nomeLogado);

if (!localStorage.getItem("usuario")) {
    localStorage.setItem("usuario", "Fulano");
}

document.getElementById("userName").textContent =
    "Olá, " + localStorage.getItem("usuario");

/* ======================================================================
   FUNÇÃO DE LOGOUT
   ====================================================================== */
function logout() {
    const confirmar = confirm("Tem certeza que deseja sair do sistema?");

    if (confirmar) {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
    }
}

function loadPage(page) {
    const content = document.getElementById('main-content');    

    /* ================= DASHBOARD ================== */
    if (page === 'dashboard') {
    content.innerHTML = `
        <h2 class="mb-4">Dashboard</h2>

        <!-- ===== CARDS ===== -->
        <div class="row g-3 mb-4">

            <div class="col-md-3">
                <div class="card p-3 text-center shadow-sm">
                    <h6 class="fw-bold">serviços DE HOJE</h6>
                    <span style="font-size: 42px; font-weight: 700;">6</span>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 text-center shadow-sm">
                    <h6 class="fw-bold">PENDENTES</h6>
                    <span style="font-size: 42px; font-weight: 700;">2</span>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 text-center shadow-sm">
                    <h6 class="fw-bold">EM ANDAMENTO</h6>
                    <span style="font-size: 42px; font-weight: 700;">3</span>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 text-center shadow-sm">
                    <h6 class="fw-bold">concluídoS</h6>
                    <span style="font-size: 42px; font-weight: 700;">1</span>
                </div>
            </div>

        </div>

        <!-- ===== TABELA ===== -->
        <div class="card shadow-sm p-3">
            <h5 class="fw-bold mb-3">serviços de Hoje</h5>

            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>serviço</th>
                        <th>Data</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>

                    <tr>
                        <td>João Silva</td>
                        <td>Revisão Total</td>
                        <td>99/99/9999</td>
                        <td>
                            <span class="status status-ok">COMPLETO</span>
                        </td>
                    </tr>

                    <tr>
                        <td>Cássio Pinto</td>
                        <td>Trc de Corrente</td>
                        <td>99/99/9999</td>
                        <td>
                            <span class="status status-bad">INCOMPLETO</span>
                        </td>
                    </tr>

                    <tr>
                        <td>Joana Lima</td>
                        <td>Trc Cabo de Freio</td>
                        <td>99/99/9999</td>
                        <td>
                            <span class="status status-bad">INCOMPLETO</span>
                        </td>
                    </tr>

                </tbody>
            </table>
        </div>

        <style>
            .status {
                padding: 6px 14px;
                border-radius: 15px;
                font-size: 13px;
                font-weight: bold;
                color: white;
            }

            .status-ok {
                background: #28a745;
            }

            .status-bad {
                background: #dc3545;
            }

            .card {
                border-radius: 12px;
            }
        </style>
    `;
}

    /* ================= ESTOQUE ================== */
    if (page === 'estoque') {
    content.innerHTML = `
        <h2>Estoque</h2>

        <div class="row mb-3">
            <div class="col-md-6">
                <input 
                    type="text"
                    id="estoqueSearch"
                    class="form-control"
                    placeholder="Pesquisar..."
                >
            </div>

            <div class="col-md-3">
                <select id="estoqueFiltro" class="form-select">
                    <option value="sku">SKU</option>
                    <option value="produto">Produto</option>
                    <option value="tamanho">Tamanho</option>
                    <option value="qtd">Qtd</option>
                    <option value="ean">EAN</option>
                </select>
            </div>

            <div class="col-md-3 text-end">
                <button class="btn btn-success w-100" id="openEstoqueModal">
                    Gerenciar Estoque
                </button>
            </div>
        </div>

        <div class="card p-0">
            <table class="table table-striped mb-0">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Produto</th>
                        <th>Tamanho</th>
                        <th>Qtd</th>
                        <th>EAN</th>
                    </tr>
                </thead>

                <tbody id="estoqueTable">
                    <tr>
                        <td data-col="sku">111</td>
                        <td data-col="produto">Pneu MTB 29"</td>
                        <td data-col="tamanho">29</td>
                        <td data-col="qtd">15</td>
                        <td data-col="ean">7891234567890</td>
                    </tr>
                    <tr>
                        <td data-col="sku">222</td>
                        <td data-col="produto">Câmara de Ar Speed</td>
                        <td data-col="tamanho">700x23</td>
                        <td data-col="qtd">32</td>
                        <td data-col="ean">7899876543210</td>
                    </tr>
                    <tr>
                        <td data-col="sku">333</td>
                        <td data-col="produto">Guidão Alumínio</td>
                        <td data-col="tamanho">44 cm</td>
                        <td data-col="qtd">8</td>
                        <td data-col="ean">7895558887770</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- MODAL GERENCIAR ESTOQUE -->
        <div class="modal fade" id="modalEstoque" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content" style="border-radius: 15px;">

                    <div class="modal-header" style="background:#7ed957; color:white;">
                        <h5 class="modal-title">Gerenciar Estoque</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <h6><strong>Dados do Produto</strong></h6>

                        <div class="mb-2">
                            <label class="form-label">SKU</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Produto</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Tamanho</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Quantidade</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">EAN</label>
                            <input type="text" class="form-control">
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-warning">Pesquisar</button>
                        <button class="btn btn-success">Salvar</button>
                        <button class="btn btn-danger">Excluir</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>

                </div>
            </div>
        </div>
    `;

    // Abrir modal
    const modalEstoque = new bootstrap.Modal(document.getElementById("modalEstoque"));
    document.getElementById("openEstoqueModal").addEventListener("click", () => {
        modalEstoque.show();
    });

    // Filtro igual ao de Agendamentos
    const input = document.getElementById("estoqueSearch");
    const filtro = document.getElementById("estoqueFiltro");
    const linhas = document.querySelectorAll("#estoqueTable tr");

    input.addEventListener("keyup", () => {
        let texto = input.value.toLowerCase().replace(/[^0-9a-z]/gi, '');
        const coluna = filtro.value;

        linhas.forEach(tr => {
            const celula = tr.querySelector(`[data-col="${coluna}"]`);

            if (!celula) {
                tr.style.display = "none";
                return;
            }

            let conteudo = celula.textContent.toLowerCase();
            let normalizado = conteudo.replace(/[^0-9a-z]/gi, '');

            tr.style.display = normalizado.includes(texto) ? "" : "none";
        });
    });
}

    /* ================= AGENDAMENTOS ================== */
    if (page === 'agendamentos') {
    content.innerHTML = `
        <h2>Agendamentos</h2>

        <!-- Barra de busca -->
        <div class="row mb-3">
            <div class="col-md-6">
                <input 
                    type="text"
                    id="agendaSearch"
                    class="form-control"
                    placeholder="Pesquisar..."
                >
            </div>

            <div class="col-md-3">
                <select id="agendaFiltro" class="form-select">
                    <option value="id">ID</option>
                    <option value="cpf">CPF</option>
                    <option value="nome">Nome</option>
                    <option value="servico">serviço</option>
                    <option value="status">Status</option>
                </select>
            </div>

            <div class="col-md-3 text-end">
                <button class="btn btn-success w-100" id="openAgendaModal">
                    Gerenciar Agendamentos
                </button>
            </div>
        </div>

        <!-- Tabela -->
        <div class="card p-0">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>CPF</th>
                        <th>Nome</th>
                        <th>Data</th>
                        <th>serviço</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="agendaTable">
                    <tr>
                        <td data-col="id">1</td>
                        <td data-col="cpf">12345678900</td>
                        <td data-col="nome">João Silva</td>
                        <td data-col="data">2025-11-20</td>
                        <td data-col="servico">Revisão</td>
                        <td data-col="status">Pendente</td>
                    </tr>

                    <tr>
                        <td data-col="id">2</td>
                        <td data-col="cpf">98765432100</td>
                        <td data-col="nome">Maria Santos</td>
                        <td data-col="data">2025-11-21</td>
                        <td data-col="servico">Troca de Peças</td>
                        <td data-col="status">Confirmado</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- MODAL GERENCIAMENTO -->
        <div class="modal fade" id="modalAgenda" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content" style="border-radius: 15px;">

                    <div class="modal-header" style="background:#7ed957; color:white;">
                        <h5 class="modal-title">Gerenciar Agendamento</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <h6><strong>Dados do Agendamento</strong></h6>

                        <div class="mb-2">
                            <label class="form-label">ID do Agendamento</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Nome do Cliente</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">serviço</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Status</label>
                            <select class="form-select">
                                <option>Pendente</option>
                                <option>Confirmado</option>
                                <option>Cancelado</option>
                                <option>Finalizado</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-warning">Pesquisar</button>
                        <button class="btn btn-success">Salvar</button>
                        <button class="btn btn-danger">Excluir</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>

                </div>
            </div>
        </div>
    `;

    // Abrir Modal
    const modalAgenda = new bootstrap.Modal(document.getElementById("modalAgenda"));
    document.getElementById("openAgendaModal").addEventListener("click", () => {
        modalAgenda.show();
    });

    // Busca / Filtro
    const agendaSearch = document.getElementById("agendaSearch");
    const agendaFiltro = document.getElementById("agendaFiltro");
    const linhasAgenda = document.querySelectorAll("#agendaTable tr");

    agendaSearch.addEventListener("keyup", () => {
        const texto = agendaSearch.value.toLowerCase().replace(/[^0-9a-z]/gi, '');
        const coluna = agendaFiltro.value;

        linhasAgenda.forEach(tr => {
            const celula = tr.querySelector(`[data-col="${coluna}"]`);
            if (!celula) {
                tr.style.display = "none";
                return;
            }

            let conteudo = celula.textContent.toLowerCase();
            let normalizado = conteudo.replace(/[^0-9a-z]/gi, '');

            tr.style.display = normalizado.includes(texto) ? "" : "none";
        });
    });
}

}

loadPage('dashboard');
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
