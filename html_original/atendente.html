            background: #7ed957;

            top: 0;
            padding-top: 25px;

            font-weight: bold;
            letter-spacing: 1px;

            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px 12px;
            transition: 0.2s;

            background: #6acb4a;

        }

        .content {

        }

            background: #ffffff;

            padding: 18px;

        }

        h2 {
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        input.form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #d7d7d7;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #7ed957 !important;
            color: #fff;
        }

        .logout-btn {
            background:#ff4d4d;
            margin-top:50px;
            font-weight:bold;
            text-align:center;
        }

            background:#e64545 !important;

                        <div class="modal-body">

                            <div class="row g-3">

    /* Modal */
    const modal = new bootstrap.Modal(document.getElementById("modalVendas"));
    document.getElementById("openVendasModal").addEventListener("click", () => {
        modal.show();
    });

    /* Filtro */
    const search = document.getElementById("vendasSearch");
    const filtro = document.getElementById("vendasFiltro");
    const linhas = document.querySelectorAll("#vendasTable tr");

    search.addEventListener("keyup", () => {
        let texto = search.value.toLowerCase().replace(/[.\\-\\/]/g, ""); 
        const coluna = filtro.value;

        linhas.forEach(tr => {
            const celula = tr.querySelector(`[data-col=\"${coluna}\"]`);

            if (celula) {
                let valor = celula.textContent.toLowerCase().replace(/[.\\-\\/]/g, "");
                tr.style.display = valor.includes(texto) ? "" : "none";
            }
        });
    });
}
