services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sixbikes-app:latest
    container_name: sixbikes-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    command: ["npm", "run", "start:backend"]

  frontend:
    image: sixbikes-app:latest
    container_name: sixbikes-frontend
    restart: unless-stopped
    environment:
      FRONTEND_PORT: 3000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: ["npm", "run", "start:frontend"]

networks:
  default:
    external:
      name: sixbikes_default
