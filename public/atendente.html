<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendente - Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        body {
            background: #f4fdf4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #7ed957;
            color: #fff;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 25px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px 12px;
            transition: 0.2s;
        }

        /* Destaque para link ativo e hover */
        .sidebar a:hover, .sidebar a.active {
            background: #6acb4a;
            transform: translateX(4px);
        }

        .content {
            margin-left: 260px;
            padding: 25px;
        }
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1051;
            background: #7ed957;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1039;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1040;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-toggle {
                display: block;
            }
            .sidebar-overlay.open {
                display: block;
            }
            .content {
                margin-left: 0;
                padding: 60px 15px 15px;
            }
            .content .table {
                font-size: 13px;
            }
            .content .card {
                overflow-x: auto;
            }
        }

        .card {
            border-radius: 18px;
            background: #ffffff;
            border: none;
            padding: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        input.form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #d7d7d7;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #7ed957 !important;
            color: #fff;
        }

        .logout-btn {
            background:#7ed957;
            margin-top:50px;
            font-weight:bold;
            text-align:center;
        }

        .logout-btn:hover {
            background:#6acb4a !important;
        }
    </style>
</head>

<body>

<button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('open');">&#9776;</button>
<div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('open');this.classList.remove('open');"></div>
<div class="sidebar">

    <h5 id="userName" class="text-center fw-bold mb-2"></h5>

    <h3 class="text-center mb-4">SixBikes Bicicletaria</h3>

    <a href="#" data-page="dashboard"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="#" data-page="estoque"><i class="fas fa-boxes me-2"></i> Estoque</a>
    <a href="#" data-page="agendamentos"><i class="fas fa-calendar-alt me-2"></i> Agendamentos</a>
    <a href="#" data-page="clientes"><i class="fas fa-users me-2"></i> Clientes</a>
    <a href="#" data-page="reservas"><i class="fas fa-clipboard-list me-2"></i> Reservas</a>
    <a href="#" data-page="tickets"><i class="fas fa-ticket-alt me-2"></i> Tickets</a>

    <a href="#" class="logout-btn" onclick="logout(); return false;"><i class="fas fa-sign-out-alt me-2"></i> Sair</a>
</div>

<div class="content">
    <div id="main-content">
        <h2 class="text-center mt-5">Carregando...</h2>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/auth.js"></script> 

<script>
/* ======================================================================
   CONFIGURAÇÃO INICIAL E LÓGICA DE NAVEGAÇÃO
   ====================================================================== */

// Exibe o nome do USUÁRIO logado (valor virá do localStorage após o login)
if (!localStorage.getItem("usuario")) {
    localStorage.setItem("usuario", "Fulano");
}
document.getElementById("userName").textContent = "Olá, " + localStorage.getItem("usuario");

async function logout() {
    const confirmar = typeof window.showStyledConfirm === 'function'
        ? await window.showStyledConfirm('Tem certeza que deseja sair do sistema?', { title: 'Sair' })
        : confirm('Tem certeza que deseja sair do sistema?');
    if (!confirmar) return;
    localStorage.removeItem("usuario");
    localStorage.removeItem("userToken");
    localStorage.removeItem("userProfile");
    window.location.href = "login.html";
}

async function escolherMetodoPagamento(titulo = 'Marcar como Pago') {
    return new Promise((resolve) => {
        const modalId = 'modalMetodoPagamentoAtendente';
        let modalEl = document.getElementById(modalId);
        if (!modalEl) {
            modalEl = document.createElement('div');
            modalEl.className = 'modal fade';
            modalEl.id = modalId;
            modalEl.tabIndex = -1;
            modalEl.setAttribute('aria-hidden', 'true');
            modalEl.innerHTML = `
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header" style="background:#7ed957; color:white;">
                            <h5 class="modal-title" id="metodoPagamentoTitulo"></h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <label for="metodoPagamentoSelect" class="form-label">Selecione o método de pagamento</label>
                            <select id="metodoPagamentoSelect" class="form-select">
                                <option value="PIX">PIX</option>
                                <option value="DINHEIRO">DINHEIRO</option>
                                <option value="CREDITO">CREDITO</option>
                                <option value="DEBITO">DEBITO</option>
                            </select>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-action="cancelar">Cancelar</button>
                            <button type="button" class="btn btn-success" data-action="confirmar">Confirmar Pagamento</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modalEl);
        }

        const bsModal = new bootstrap.Modal(modalEl);
        const titleEl = modalEl.querySelector('#metodoPagamentoTitulo');
        const select = modalEl.querySelector('#metodoPagamentoSelect');
        const cancelBtn = modalEl.querySelector('[data-action="cancelar"]');
        const confirmBtn = modalEl.querySelector('[data-action="confirmar"]');

        titleEl.textContent = titulo;

        let resolved = false;
        const onHidden = () => {
            if (!resolved) resolve(null);
            modalEl.removeEventListener('hidden.bs.modal', onHidden);
        };
        modalEl.addEventListener('hidden.bs.modal', onHidden);

        cancelBtn.onclick = () => {
            resolved = true;
            resolve(null);
            bsModal.hide();
        };
        confirmBtn.onclick = () => {
            resolved = true;
            resolve(select.value || 'PIX');
            bsModal.hide();
        };

        select.value = 'PIX';
        bsModal.show();
    });
}


/**
 * Função principal para carregar o conteúdo de cada página/menu.
 */
// CÓDIGO RESTAURADO E COMPLETO PARA A FUNÇÃO loadPage:

function loadPage(page) {
    window.__atendenteCurrentPage = page;
    const content = document.getElementById('main-content');    
    
    // Simulação de carregamento (em um projeto real, esta Função faria um fetchAuthenticated)
    content.innerHTML = `<h2>Carregando ${page}...</h2>`; 
    
    // Garante que o link ativo na sidebar ? atualizado
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.classList.remove('active');
        if (link.dataset.page === page) {
            link.classList.add('active');
        }
    });
    // Fecha sidebar no mobile
    document.querySelector('.sidebar').classList.remove('open');
    document.querySelector('.sidebar-overlay').classList.remove('open');

    /* ================= DASHBOARD ================== */
    if (page === 'dashboard') {
        content.innerHTML = `
            <h2>Dashboard</h2>

            <div class="row g-3 text-center mb-4">
                <div class="col-md-4">
                    <div class="card shadow-sm p-4">
                        <h5 class="fw-bold">Para Pagamento</h5>
                        <h1 class="fw-bold" id="countParaPagamento">-</h1>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm p-4">
                        <h5 class="fw-bold">Tickets Abertos</h5>
                        <h1 class="fw-bold" id="countTicketsAbertos">-</h1>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm p-4">
                        <h5 class="fw-bold">Tickets Assumidos</h5>
                        <h1 class="fw-bold" id="countTicketsAssumidos">-</h1>
                    </div>
                </div>
            </div>

            <div class="row mt-4">

                <div class="col-md-7">
                    <div class="card shadow-sm p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="fw-bold mb-0">Tickets de Suporte Abertos</h5>
                            <span class="badge bg-warning" id="badgeAbertos">0</span>
                        </div>
                        <table class="table text-center">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Cliente</th>
                                    <th>Assunto</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="dashTicketsAbertos"></tbody>
                        </table>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="card shadow-sm p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="fw-bold mb-0">Agendamentos Para Pagamento</h5>
                            <span class="badge bg-info" id="badgeParaPg">0</span>
                        </div>
                        <table class="table text-center">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>serviço</th>
                                    <th>Data</th>
                                    <th>Valor</th>
                                </tr>
                            </thead>
                            <tbody id="dashAgParaPagamento"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        `;

        (async function loadDashboard(){
            const setText = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
            try {
                const [ticketsAbertos, ticketsAssumidos, agParaPgResp] = await Promise.all([
                    fetchAuthenticated('/api/tickets/abertos', 'GET').catch(() => []),
                    fetchAuthenticated('/api/tickets/assumidos', 'GET').catch(() => []),
                    fetchAuthenticated('/api/agendamentos/para-pagamento', 'GET').catch(() => [])
                ]);

                const abertos = Array.isArray(ticketsAbertos) ? ticketsAbertos : (ticketsAbertos?.data || []);
                const assumidos = Array.isArray(ticketsAssumidos) ? ticketsAssumidos : (ticketsAssumidos?.data || []);
                const agList = Array.isArray(agParaPgResp) ? agParaPgResp : (agParaPgResp?.data || agParaPgResp?.agendamentos || []);

                setText('countTicketsAbertos', abertos.length);
                setText('countTicketsAssumidos', assumidos.length);
                setText('countParaPagamento', agList.length);
                setText('badgeAbertos', abertos.length);
                setText('badgeParaPg', agList.length);

                // Render tickets abertos (Máximo 5)
                const tBody = document.getElementById('dashTicketsAbertos');
                if (tBody) {
                    tBody.innerHTML = '';
                    (abertos.slice(0,5)).forEach(t => {
                        const tr = document.createElement('tr');
                        const status = String(t.status||'').toUpperCase();
                        const badge = status === 'NOVO' ? 'bg-danger' : status === 'ABERTO' ? 'bg-warning' : 'bg-secondary';
                        tr.innerHTML = `
                            <td>${t.id}</td>
                            <td>${t.nome||'-'}</td>
                            <td>${t.titulo||t.assunto||'-'}</td>
                            <td><span class="badge ${badge}">${status||'-'}</span></td>
                        `;
                        tBody.appendChild(tr);
                    });
                    if (abertos.length === 0) tBody.innerHTML = '<tr><td colspan="4" class="text-muted">Nenhum ticket aberto.</td></tr>';
                }

                // Render agendamentos para pagamento (Máximo 5)
                const aBody = document.getElementById('dashAgParaPagamento');
                if (aBody) {
                    aBody.innerHTML = '';
                    (agList.slice(0,5)).forEach(a => {
                        const data = a.dataagendada ? new Date(a.dataagendada).toLocaleString('pt-BR') : '-';
                        const valor = a.valor ? Number(a.valor).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '-';
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${a.cliente_nome||'-'}</td>
                            <td>${a.servico_nome||'-'}</td>
                            <td>${data}</td>
                            <td>${valor}</td>
                        `;
                        aBody.appendChild(tr);
                    });
                    if (agList.length === 0) aBody.innerHTML = '<tr><td colspan="4" class="text-muted">Nenhum agendamento aguardando pagamento.</td></tr>';
                }
            } catch (e) {
                console.warn('Falha ao carregar dashboard:', e.message);
            }
        })();
    }

    /* ================= ESTOQUE ================== */
    else if (page === 'estoque') {
        content.innerHTML = `
            <h2>Estoque</h2>
            <div class="row mb-3">
                <div class="col-md-6">
                    <input type="text" id="estoqueSearch" class="form-control" placeholder="Pesquisar...">
                </div>
                <div class="col-md-3">
                    <select id="estoqueFiltro" class="form-select">
                        <option value="idProduto">ID</option>
                        <option value="nome">Nome</option>
                        <option value="descricao">Descrição</option>
                        <option value="categoria">Categoria</option>
                        <option value="preco">Preço</option>
                        <option value="qtd">Qtd</option>
                    </select>
                </div>
                <div class="col-md-3 text-end">
                    <!-- Sem botões de cadastro/gerenciamento para o atendente -->
                </div>
            </div>
            <div class="card p-0">
                <table class="table table-striped mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Qtd</th>
                        </tr>
                    </thead>
                    <tbody id="estoqueTable"></tbody>
                </table>
            </div>
        `;

        // Estado de seleção apenas para destaque visual (sem gerenciamento)
        let produtoSelecionado = null;

        function habilitarSelecaoGrid() {
            const tbody = document.getElementById('estoqueTable');
            tbody.querySelectorAll('tr').forEach(tr => {
                tr.style.cursor = 'pointer';
                tr.addEventListener('click', () => {
                    tbody.querySelectorAll('tr').forEach(r => r.classList.remove('table-active'));
                    tr.classList.add('table-active');
                    const id = tr.querySelector('[data-col="idProduto"]').textContent.trim();
                    const nome = tr.querySelector('[data-col="nome"]').textContent.trim();
                    const descricao = tr.querySelector('[data-col="descricao"]').textContent.trim();
                    const categoria = tr.querySelector('[data-col="categoria"]').textContent.trim();
                    const preco = tr.querySelector('[data-col="preco"]').textContent.trim();
                    const qtd = tr.querySelector('[data-col="qtd"]').textContent.trim();
                    produtoSelecionado = { id: Number(id), nome, descricao, categoria, preco: Number(preco), qtd: Number(qtd) };
                });
            });
        }

        // Limpa seleção ao clicar fora
        document.addEventListener('click', (ev) => {
            const tbody = document.getElementById('estoqueTable');
            const grid = tbody?.closest('table');
            const insideGrid = grid && grid.contains(ev.target);
            if (!insideGrid) {
                tbody?.querySelectorAll('tr').forEach(r => r.classList.remove('table-active'));
                produtoSelecionado = null;
            }
        });

        async function carregarCatalogo() {
            try {
                const resposta = await fetchAuthenticated('/api/produtos', 'GET');
                const tbody = document.getElementById('estoqueTable');
                tbody.innerHTML = '';
                const lista = Array.isArray(resposta) ? resposta : (resposta?.data || resposta?.produtos || []);
                lista.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td data-col="idProduto">${p.idproduto ?? p.idProduto ?? ''}</td>
                        <td data-col="nome">${p.nome ?? ''}</td>
                        <td data-col="descricao">${p.descricao ?? ''}</td>
                        <td data-col="categoria">${(p.categoria ?? '').toString().trim() || 'Sem categoria'}</td>
                        <td data-col="preco">${p.preco ?? ''}</td>
                        <td data-col="qtd">${p.qtd ?? 0}</td>
                    `;
                    tbody.appendChild(tr);
                });
                habilitarSelecaoGrid();
            } catch (e) {
                const tbody = document.getElementById('estoqueTable');
                tbody.innerHTML = `<tr><td colspan="6" class="text-danger">Erro ao carregar estoque</td></tr>`;
            }
        }

        // Filtro de busca semelhante ao gerencia.html
        const input = document.getElementById('estoqueSearch');
        const filtro = document.getElementById('estoqueFiltro');
        input.addEventListener('keyup', () => {
            const texto = input.value.toLowerCase().replace(/[^0-9a-z]/gi, '');
            const coluna = filtro.value;
            document.querySelectorAll('#estoqueTable tr').forEach(tr => {
                const cel = tr.querySelector(`[data-col="${coluna}"]`);
                const val = cel ? (cel.textContent || '').toLowerCase().replace(/[^0-9a-z]/gi,'') : '';
                tr.style.display = val.includes(texto) ? '' : 'none';
            });
        });

        carregarCatalogo();
    }

    /* ================= AGENDAMENTOS ================== */
    else if (page === 'agendamentos') {
        content.innerHTML = `
            <h2>Agendamentos - Para Pagamento</h2>

            <div class="row mb-3">
                <div class="col-md-6">
                    <input 
                        type="text"
                        id="agendaSearch"
                        class="form-control"
                        placeholder="Pesquisar..."
                    >
                </div>

                <div class="col-md-3">
                    <select id="agendaFiltro" class="form-select">
                        <option value="id">ID</option>
                        <option value="cpf">CPF</option>
                        <option value="nome">Nome</option>
                        <option value="servico">serviço</option>
                        <option value="status">Status</option>
                    </select>
                </div>

                <div class="col-md-3 text-end">
                    <button class="btn btn-success w-100" id="recarregarAgendamentos">
                        Atualizar
                    </button>
                </div>
            </div>

            <div class="card p-0">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>CPF</th>
                            <th>Nome</th>
                            <th>Data Agendada</th>
                            <th>serviço</th>
                            <th>Valor</th>
                            <th>Status</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>

                    <tbody id="agendaTable">
                    </tbody>
                </table>
            </div>
        `;

        async function carregarAgendamentosParaPagamento() {
            const tbody = document.getElementById('agendaTable');
            tbody.innerHTML = '<tr><td colspan="8" class="text-center">Carregando...</td></tr>';
            try {
                const resposta = await fetchAuthenticated('/api/agendamentos/para-pagamento', 'GET');
                const lista = Array.isArray(resposta) ? resposta : (resposta?.data || resposta?.agendamentos || []);
                tbody.innerHTML = '';
                if (lista.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Nenhum agendamento aguardando pagamento.</td></tr>';
                    return;
                }
                lista.forEach(a => {
                    const tr = document.createElement('tr');
                    const dataAgendada = a.dataagendada ? new Date(a.dataagendada).toLocaleString('pt-BR') : '-';
                    const valor = a.valor ? Number(a.valor).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '-';
                    tr.innerHTML = `
                        <td data-col="id">${a.id ?? ''}</td>
                        <td data-col="cpf">${a.cliente_cpf ?? ''}</td>
                        <td data-col="nome">${a.cliente_nome ?? ''}</td>
                        <td data-col="data">${dataAgendada}</td>
                        <td data-col="servico">${a.servico_nome ?? ''}</td>
                        <td>${valor}</td>
                        <td data-col="status"><span class="badge bg-warning">${a.status ?? ''}</span></td>
                        <td class="text-center"><button class="btn btn-sm btn-success" data-pagar="${a.id}">Marcar como Pago</button></td>
                    `;
                    tbody.appendChild(tr);
                });

                // Handler para botões Marcar como Pago
                tbody.querySelectorAll('button[data-pagar]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.pagar;
                        const metodo = await escolherMetodoPagamento();
                        if (!metodo) return;
                        btn.disabled = true;
                        try {
                            await fetchAuthenticated(`/api/agendamentos/${id}/pagar`, 'PUT', { metodoPagamento: metodo });
                            alert(`Agendamento marcado como pago via ${metodo}.`);
                            carregarAgendamentosParaPagamento();
                        } catch (e) {
                            alert('Erro ao marcar como pago: ' + (e.message || ''));
                            btn.disabled = false;
                        }
                    });
                });

                // Busca/Filtro
                const search = document.getElementById('agendaSearch');
                const filtro = document.getElementById('agendaFiltro');
                const linhas = tbody.querySelectorAll('tr');
                if (search && filtro) {
                    search.addEventListener('keyup', () => {
                        const texto = search.value.toLowerCase().replace(/[^0-9a-z]/gi, '').trim();
                        const coluna = filtro.value;
                        linhas.forEach(tr => {
                            const celula = tr.querySelector(`[data-col="${coluna}"]`);
                            const valor = celula?.textContent.toLowerCase().replace(/[^0-9a-z]/gi,'') || '';
                            tr.style.display = valor.includes(texto) ? '' : 'none';
                        });
                    });
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-danger text-center">Erro ao carregar agendamentos: ${e.message}</td></tr>`;
            }
        }

        carregarAgendamentosParaPagamento();

        const btnRecarregar = document.getElementById('recarregarAgendamentos');
        if (btnRecarregar) {
            btnRecarregar.addEventListener('click', carregarAgendamentosParaPagamento);
        }

                async function carregarAbertos(){
                    try{
                        const itens = await fetchAuthenticated('/api/tickets/abertos','GET');
                        const tbody = document.getElementById('ticketsAbertos');
                        tbody.innerHTML='';
                        (itens||[]).forEach(t=>{

            try {
                const res = await fetchAuthenticated('/api/produtos', 'GET');
                const produtos = Array.isArray(res) ? res : (res?.data || res?.produtos || []);
                const lower = term.toLowerCase();
                produtos

                  .slice(0, 20)
                  .forEach(p => {
                      const a = document.createElement('a');

                          const valorUnit = typeof p.preco === 'number' ? p.preco : parseFloat(String(p.preco||'0').replace(',','.'))||0;

                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.cancelar;
                        const confirmar = typeof window.showStyledConfirm === 'function'

                            : confirm('Confirmar cancelamento da reserva?');
                        if (!confirmar) return;
                        try {
                            await fetchAuthenticated(`/api/reservas/${id}/cancelar`, 'PUT');
                            alert('Reserva cancelada.');
                            carregarReservas();
                        } catch (e) {
                            alert('Erro ao cancelar reserva.');
                        }
                    });
                });

            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-danger">Erro ao carregar reservas</td></tr>`;
            }
        }

        // Botão Nova Reserva
        document.getElementById('novaReservaBtn').addEventListener('click', () => {
            novaReservaData = { clienteId: null, clienteNome: '', itens: [] };
            document.getElementById('buscaCliente').value = '';
            document.getElementById('resultadosCliente').innerHTML = '';
            document.getElementById('clienteSelecionado').classList.add('d-none');
            document.getElementById('buscaProdutoNova').value = '';
            document.getElementById('resultadosProduto').innerHTML = '';
            renderItensNovaReserva();
            modalNovaReserva.show();
        });

        document.getElementById('refreshReservas')?.addEventListener('click', carregarReservas);

        // Busca de Cliente
        const buscarClientes = async () => {
            const termo = document.getElementById('buscaCliente').value.trim();
            const resultados = document.getElementById('resultadosCliente');
            
            if (termo.length < 2) {
                resultados.innerHTML = '<div class="list-group-item text-muted">Digite pelo menos 2 caracteres...</div>';
                return;
            }

            try {
                const res = await fetchAuthenticated('/api/clientes', 'GET');
                const clientes = res?.data || res || [];
                const matches = clientes.filter(c => {
                    const nome = (c.nome || '').toLowerCase();
                    const email = (c.email || '').toLowerCase();
                    const termoLower = termo.toLowerCase();
                    return nome.includes(termoLower) || email.includes(termoLower);
                });

                if (matches.length === 0) {
                    resultados.innerHTML = '<div class="list-group-item text-muted">Nenhum cliente encontrado</div>';
                    return;
                }

                resultados.innerHTML = matches.map(c => `
                    <button class="list-group-item list-group-item-action" data-cliente-id="${c.id}" data-cliente-nome="${c.nome}">
                        <strong>${c.nome}</strong><br>
                        <small class="text-muted">CPF: ${c.cpf || '-'} | Email: ${c.email || '-'}</small>
                    </button>
                `).join('');

                resultados.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        // Garantir que o ID seja um número
                        novaReservaData.clienteId = parseInt(btn.dataset.clienteId, 10);
                        novaReservaData.clienteNome = btn.dataset.clienteNome;
                        document.getElementById('nomeClienteSelecionado').textContent = btn.dataset.clienteNome;
                        document.getElementById('clienteSelecionado').classList.remove('d-none');
                        resultados.innerHTML = '';
                        document.getElementById('buscaCliente').value = '';
                        verificarBotaoFinalizar();
                    });
                });
            } catch (err) {
                resultados.innerHTML = '<div class="list-group-item text-danger">Erro ao buscar clientes</div>';
            }
        };

        document.getElementById('btnBuscarCliente').addEventListener('click', buscarClientes);
        document.getElementById('buscaCliente').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') buscarClientes();
        });

            novaReservaData.clienteId = null;
            novaReservaData.clienteNome = '';

        // Busca de Produtos para Nova Reserva

            const termo = document.getElementById('buscaProdutoNova').value.trim();
            const resultados = document.getElementById('resultadosProduto');
            
            if (termo.length < 2) {
                resultados.innerHTML = '<div class="list-group-item text-muted">Digite pelo menos 2 caracteres...</div>';
                return;
            }

            try {
                const res = await fetchAuthenticated('/api/produtos', 'GET');
                const produtos = res?.data || res || [];
                
                const matches = produtos.filter(p => {
                    const nome = (p.nome || '').toLowerCase();
                    // Verifica qtd (do backend) ou quantidadeatual
                    const estoque = parseInt(p.qtd || p.quantidadeatual || 0);
                    // Mostrar apenas produtos com estoque disponível
                    return nome.includes(termo.toLowerCase()) && estoque > 0;
                });

                if (matches.length === 0) {
                    resultados.innerHTML = '<div class="list-group-item text-muted">Nenhum produto com estoque disponível encontrado</div>';
                    return;
                }

                resultados.innerHTML = matches.map(p => {
                    const estoque = parseInt(p.qtd || p.quantidadeatual || 0);
                    const estoqueClass = estoque > 10 ? 'text-success' : estoque > 5 ? 'text-warning' : 'text-danger';
                    return `
                        <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" 
                                data-produto-id="${p.idProduto || p.idproduto}" 
                                data-produto-nome="${p.nome}"

                                <strong>${p.nome}</strong><br>
                                <small class="${estoqueClass}">Estoque: ${estoque} unidades</small>
                            </div>
                            <span class="badge bg-success">R$ ${parseFloat(p.preco || 0).toFixed(2)}</span>
                        </button>
                    `;
                }).join('');

                resultados.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const estoque = parseInt(btn.dataset.produtoEstoque);
                        const produto = {
                            idProduto: btn.dataset.produtoId,
                            nomeProduto: btn.dataset.produtoNome,
                            valorUnitario: parseFloat(btn.dataset.produtoPreco),
                            quantidade: 1,
                            estoqueDisponivel: estoque
                        };
                        novaReservaData.itens.push(produto);
                        renderItensNovaReserva();
                        resultados.innerHTML = '';
                        document.getElementById('buscaProdutoNova').value = '';
                        verificarBotaoFinalizar();
                    });
                });
            } catch (err) {
                resultados.innerHTML = '<div class="list-group-item text-danger">Erro ao buscar produtos</div>';
            }
        };

        document.getElementById('btnBuscarProduto').addEventListener('click', buscarProdutosNovaReserva);
        document.getElementById('buscaProdutoNova').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') buscarProdutosNovaReserva();
        });

        // Renderizar itens da nova reserva
        function renderItensNovaReserva() {
            const tbody = document.getElementById('itensNovaReserva');
            tbody.innerHTML = '';
            
            let total = 0;
            novaReservaData.itens.forEach((item, idx) => {
                const subtotal = item.quantidade * item.valorUnitario;
                total += subtotal;
                
                const maxEstoque = item.estoqueDisponivel || 999;
                const estoqueInfo = item.estoqueDisponivel ? `<br><small class="text-muted">Máx: ${maxEstoque}</small>` : '';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.nomeProduto}${estoqueInfo}</td>
                    <td>
                        <input type="number" min="1" max="${maxEstoque}" class="form-control form-control-sm" 
                               value="${item.quantidade}" data-idx="${idx}" data-max="${maxEstoque}">
                    </td>
                    <td>R$ ${item.valorUnitario.toFixed(2)}</td>
                    <td>R$ ${subtotal.toFixed(2)}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger" data-remover="${idx}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);

                // Event listener para quantidade
                const input = tr.querySelector('input');
                input.addEventListener('input', (e) => {
                    let novaQtd = parseInt(e.target.value) || 1;
                    const max = parseInt(e.target.dataset.max);
                    
                    // Validar estoque disponível
                    if (novaQtd > max) {
                        alert(`Quantidade solicitada (${novaQtd}) excede o estoque disponível (${max})`);
                        novaQtd = max;
                        e.target.value = max;
                    }
                    
                    if (novaQtd < 1) {
                        novaQtd = 1;
                        e.target.value = 1;
                    }
                    
                    novaReservaData.itens[idx].quantidade = novaQtd;
                    renderItensNovaReserva();
                });

                // Event listener para remover
                tr.querySelector('button[data-remover]').addEventListener('click', () => {
                    novaReservaData.itens.splice(idx, 1);
                    renderItensNovaReserva();
                    verificarBotaoFinalizar();
                });
            });

            document.getElementById('totalNovaReserva').textContent = `R$ ${total.toFixed(2)}`;
        }

        // Verificar se pode finalizar
        function verificarBotaoFinalizar() {
            const btn = document.getElementById('finalizarNovaReserva');
            const podeFinalizar = novaReservaData.clienteId && novaReservaData.itens.length > 0;
            btn.disabled = !podeFinalizar;
        }

        // Finalizar Nova Reserva
        document.getElementById('finalizarNovaReserva').addEventListener('click', async () => {
            if (!novaReservaData.clienteId || novaReservaData.itens.length === 0) {
                alert('Selecione um cliente e adicione pelo menos um produto!');
                return;
            }

            try {
                const payload = {
                    clienteId: parseInt(novaReservaData.clienteId, 10), // Garantir que seja número
                    itens: novaReservaData.itens.map(item => ({
                        idProduto: parseInt(item.idProduto, 10),
                        quantidade: parseInt(item.quantidade, 10),
                        valorUnitario: parseFloat(item.valorUnitario)
                    }))
                };

                const response = await fetchAuthenticated('/api/reservas', 'POST', payload);
                
                alert(`Reserva #${response.idReserva} criada com sucesso para o cliente ${novaReservaData.clienteNome}!`);
                modalNovaReserva.hide();
                carregarReservas();
            } catch (err) {
                alert('Erro ao criar reserva: ' + (err.error || err.message || 'Erro desconhecido'));
            }
        });

        carregarReservas();
    }

    /* ================= VENDAS ================== */
    else if (page === 'vendas') {
        content.innerHTML = `

/**
 * Função utilitária para configurar a busca/filtro e a abertura de modais em páginas com tabelas.
 * A lógica foi extraída do seu código original para reutilização e clareza.
 */
function setupTableSearchAndModal(page, searchId, filterId, tableId, modalId, buttonId) {
    // Configuração do Modal
    const modalEl = document.getElementById(modalId);
    if (modalEl) {
        const modal = new bootstrap.Modal(modalEl);
        document.getElementById(buttonId).addEventListener("click", () => {
            modal.show();
        });
    }

    // lógica de Busca / Filtro
    const search = document.getElementById(searchId);
    const filtro = document.getElementById(filterId);
    const linhas = document.querySelectorAll(`#${tableId} tr`);

    if (search && filtro && linhas.length > 0) {
        search.addEventListener("keyup", () => {
            // Normaliza o texto (remove pontos e hífens) para busca limpa
            let texto = search.value.toLowerCase().replace(/[.\\-\\/]/g, "").trim(); 
            const coluna = filtro.value;

            linhas.forEach(tr => {
                const celula = tr.querySelector(`[data-col="${coluna}"]`);

                if (celula) {
                    let valor = celula.textContent.toLowerCase().replace(/[.\\-\\/]/g, "").trim();
                    tr.style.display = valor.includes(texto) ? "" : "none";
                }
            });
        });
    }
}


/* ======================================================================
   INICIALIZAÇÃO DO DOM E EVENT LISTENERS PADRÕES
   ====================================================================== */

document.addEventListener('DOMContentLoaded', () => {
    // 1. Inicia o dashboard (padrão ao carregar)
    loadPage('dashboard');

    // 2. Listener para os links da Sidebar
    document.querySelectorAll('.sidebar a[data-page]').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = e.target.closest('a').dataset.page;
            
            // Gerencia o estado 'active' no menu
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            e.target.closest('a').classList.add('active');

            if (page) {
                loadPage(page);
            }
        });
    });
    
    // 3. Verifica se precisa trocar a senha (usa Função de auth.js)
    if(typeof checkAndShowChangePasswordModal !== 'undefined') {
        checkAndShowChangePasswordModal();
    }

    let atendenteRealtimeTimer = null;
    window.addEventListener('sb:realtime', (event) => {
        const detail = event && event.detail ? event.detail : {};
        const scopeList = Array.isArray(detail.scopes) ? detail.scopes : [];
        const eventType = String(detail.eventType || '').toLowerCase();
        const primaryScope = eventType.includes('.') ? eventType.split('.')[0] : '';
        const scopes = new Set([...scopeList, primaryScope].filter(Boolean));
        if (scopes.size === 0) return;

        const currentPage = window.__atendenteCurrentPage || 'dashboard';
        const shouldReloadCurrentPage =
            (currentPage === 'dashboard') ||
            (currentPage === 'estoque' && (scopes.has('produtos') || scopes.has('estoque') || scopes.has('servicos'))) ||
            (currentPage === 'agendamentos' && (scopes.has('agendamentos') || scopes.has('reservas'))) ||
            (currentPage === 'clientes' && scopes.has('clientes')) ||
            (currentPage === 'reservas' && (scopes.has('reservas') || scopes.has('agendamentos'))) ||
            (currentPage === 'tickets' && scopes.has('tickets'));

        if (!shouldReloadCurrentPage) return;
        if (atendenteRealtimeTimer) clearTimeout(atendenteRealtimeTimer);
        atendenteRealtimeTimer = setTimeout(() => {
            loadPage(currentPage);
        }, 220);
    });
});
