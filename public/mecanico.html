<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecanico - Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        body {
            background: #f4fdf4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #7ed957;
            color: #fff;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 25px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px 12px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #6acb4a;
            transform: translateX(4px);
        }

        .content {
            margin-left: 260px;
            padding: 25px;
        }

        .card {
            border-radius: 18px;
            background: #ffffff;
            border: none;
            padding: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        input.form-control {
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid #d7d7d7;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #7ed957 !important;
            color: #fff;
        }

        .logout-btn {
            background:#7ed957;
            margin-top:50px;
            font-weight:bold;
            text-align:center;
        }

        .logout-btn:hover {
            background:#6acb4a !important;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <h5 id="userName" class="text-center fw-bold mb-2"></h5>

    <h3 class="text-center mb-4">SixBikes Bicicletaria</h3>

    <a href="#" data-page="dashboard" onclick="loadPage('dashboard'); return false;"><i class="fas fa-home me-2"></i>Dashboard</a>
    <a href="#" data-page="agendamentos" onclick="loadPage('agendamentos'); return false;"><i class="fas fa-calendar-alt me-2"></i>Agendamentos</a>

    <a href="#" class="logout-btn" onclick="logout(); return false;"><i class="fas fa-sign-out-alt me-2"></i>Sair</a>
</div>

<div class="content">
    <div id="main-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/auth.js"></script>

<script>
if (!localStorage.getItem("usuario")) {
    localStorage.setItem("usuario", "Fulano");
}

document.getElementById("userName").textContent =
    "Olá, " + localStorage.getItem("usuario");

function logout() {
    const confirmar = confirm("Tem certeza que deseja sair do sistema?");
    if (confirmar) {
        localStorage.removeItem("usuario");
        localStorage.removeItem("userToken");
        localStorage.removeItem("userProfile");
        window.location.href = "login.html";
    }
}

function loadPage(page) {
    const content = document.getElementById('main-content');    

    if (page === 'dashboard') {
        content.innerHTML = `
            <h2 class="mb-4">Dashboard</h2>
            <div class="row g-3 mb-4 text-center">
                <div class="col-md-3">
                    <div class="card p-3 shadow-sm">
                        <h6 class="fw-bold">ABERTOS</h6>
                        <span id="dashCountAbertos" style="font-size:42px;font-weight:700;">-</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 shadow-sm">
                        <h6 class="fw-bold">EM ANDAMENTO (MEUS)</h6>
                        <span id="dashCountAtivos" style="font-size:42px;font-weight:700;">-</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 shadow-sm">
                        <h6 class="fw-bold">HOJE</h6>
                        <span id="dashCountHoje" style="font-size:42px;font-weight:700;">-</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 shadow-sm">
                        <h6 class="fw-bold">PARA PAGAMENTO</h6>
                        <span id="dashCountParaPg" style="font-size:42px;font-weight:700;">-</span>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-end mb-2">
                <button class="btn btn-sm btn-outline-primary" id="btnDashRefresh">Atualizar</button>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="card p-3 shadow-sm">
                        <h5 class="fw-bold mb-2">Agendamentos Abertos</h5>
                        <table class="table table-sm align-middle mb-0">
                            <thead><tr><th>ID</th><th>Cliente</th><th>Serviço</th><th>Data</th></tr></thead>
                            <tbody id="dashAbertosBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card p-3 shadow-sm">
                        <h5 class="fw-bold mb-2">Meus Em Andamento</h5>
                        <table class="table table-sm align-middle mb-0">
                            <thead><tr><th>ID</th><th>Cliente</th><th>Serviço</th><th>Data</th></tr></thead>
                            <tbody id="dashAtivosBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;

        async function loadDashboardMechanic() {
            const setVal = (id,val)=>{const el=document.getElementById(id); if(el) el.textContent=val;};
            const bodyAbertos = document.getElementById('dashAbertosBody');
            const bodyAtivos = document.getElementById('dashAtivosBody');
            if (bodyAbertos) bodyAbertos.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Carregando...</td></tr>';
            if (bodyAtivos) bodyAtivos.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Carregando...</td></tr>';
            try {
                const [abertos, ativos, paraPagamento] = await Promise.all([
                    fetchAuth('/agendamentos/abertos').catch(()=>[]),
                    fetchAuth('/agendamentos/ativos').catch(()=>[]),
                    // atendente route not accessible to mecânico; attempt only if token role has permission
                    fetchAuth('/agendamentos/para-pagamento').catch(()=>[])
                ]);
                const abList = Array.isArray(abertos)?abertos:[];
                const atList = Array.isArray(ativos)?ativos:[];
                const pgList = Array.isArray(paraPagamento)?paraPagamento:[];
                setVal('dashCountAbertos', abList.length);
                setVal('dashCountAtivos', atList.length);
                setVal('dashCountParaPg', pgList.length || '0');
                // Hoje: count agendamentos (abertos+ativos) com dataAgendada = hoje
                const hojeStr = new Date().toISOString().slice(0,10);
                const countHoje = [...abList, ...atList].filter(a => a.dataagendada && a.dataagendada.slice(0,10) === hojeStr).length;
                setVal('dashCountHoje', countHoje);
                if (bodyAbertos) {
                    bodyAbertos.innerHTML='';
                    abList.slice(0,8).forEach(a=>{
                        const dt = a.dataagendada? new Date(a.dataagendada).toLocaleString('pt-BR'):'-';
                        const tr=document.createElement('tr');
                        tr.innerHTML = `<td>${a.id}</td><td>${a.cliente_nome||'-'}</td><td>${a.servico_nome||'-'}</td><td>${dt}</td>`;
                        bodyAbertos.appendChild(tr);
                    });
                    if (abList.length===0) bodyAbertos.innerHTML='<tr><td colspan="4" class="text-muted">Nenhum aberto.</td></tr>';
                }
                if (bodyAtivos) {
                    bodyAtivos.innerHTML='';
                    atList.slice(0,8).forEach(a=>{
                        const dt = a.dataagendada? new Date(a.dataagendada).toLocaleString('pt-BR'):'-';
                        const tr=document.createElement('tr');
                        tr.innerHTML = `<td>${a.id}</td><td>${a.cliente_nome||'-'}</td><td>${a.servico_nome||'-'}</td><td>${dt}</td>`;
                        bodyAtivos.appendChild(tr);
                    });
                    if (atList.length===0) bodyAtivos.innerHTML='<tr><td colspan="4" class="text-muted">Nenhum em andamento.</td></tr>';
                }
            } catch (e) {
                if (bodyAbertos) bodyAbertos.innerHTML = `<tr><td colspan="4" class="text-danger">Falha: ${e.message}</td></tr>`;
                if (bodyAtivos) bodyAtivos.innerHTML = `<tr><td colspan="4" class="text-danger">Falha: ${e.message}</td></tr>`;
            }
        }
        loadDashboardMechanic();
        const btn = document.getElementById('btnDashRefresh');
        if (btn) btn.addEventListener('click', loadDashboardMechanic);

    } else if (page === 'estoque') {
    content.innerHTML = `
        <h2>Estoque</h2>
        <div class="row mb-3">
            <div class="col-md-6"><input type="text" id="estoqueSearch" class="form-control" placeholder="Pesquisar..."></div>
            <div class="col-md-3"><select id="estoqueFiltro" class="form-select">
                <option value="sku">SKU</option>
                <option value="produto">Produto</option>
                <option value="tamanho">Tamanho</option>
                <option value="qtd">Qtd</option>
                <option value="ean">EAN</option>
            </select></div>
            <div class="col-md-3 text-end"><button class="btn btn-success w-100" id="openEstoqueModal">📦 Gerenciar Estoque</button></div>
        </div>
        <div class="card p-0">
            <table class="table table-striped mb-0">
                <thead><tr><th>SKU</th><th>Produto</th><th>Tamanho</th><th>Qtd</th><th>EAN</th></tr></thead>
                <tbody id="estoqueTable">
                    <tr><td data-col="sku">111</td><td data-col="produto">Pneu MTB 29"</td><td data-col="tamanho">29</td><td data-col="qtd">15</td><td data-col="ean">7891234567890</td></tr>
                    <tr><td data-col="sku">222</td><td data-col="produto">Câmara de Ar Speed</td><td data-col="tamanho">700x23</td><td data-col="qtd">32</td><td data-col="ean">7899876543210</td></tr>
                    <tr><td data-col="sku">333</td><td data-col="produto">Guidão Alumínio</td><td data-col="tamanho">44 cm</td><td data-col="qtd">8</td><td data-col="ean">7895558887770</td></tr>
                </tbody>
            </table>
        </div>
        <div class="modal fade" id="modalEstoque" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content" style="border-radius: 15px;">
                    <div class="modal-header" style="background:#7ed957; color:white;">
                        <h5 class="modal-title">Gerenciar Estoque</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <h6><strong>Dados do Produto</strong></h6>
                        <div class="mb-2"><label class="form-label">SKU</label><input type="text" class="form-control"></div>
                        <div class="mb-2"><label class="form-label">Produto</label><input type="text" class="form-control"></div>
                        <div class="mb-2"><label class="form-label">Tamanho</label><input type="text" class="form-control"></div>
                        <div class="mb-2"><label class="form-label">Quantidade</label><input type="number" class="form-control"></div>
                        <div class="mb-2"><label class="form-label">EAN</label><input type="text" class="form-control"></div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-warning">Pesquisar</button>
                        <button class="btn btn-success">Salvar</button>
                        <button class="btn btn-danger">Excluir</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>
    `;
    const modalEstoque = new bootstrap.Modal(document.getElementById("modalEstoque"));
    document.getElementById("openEstoqueModal").addEventListener("click", () => modalEstoque.show());
    const input = document.getElementById("estoqueSearch");
    const filtro = document.getElementById("estoqueFiltro");
    const linhas = document.querySelectorAll("#estoqueTable tr");
    input.addEventListener("keyup", () => {
        let texto = input.value.toLowerCase().replace(/[^0-9a-z]/gi, '');
        const coluna = filtro.value;
        linhas.forEach(tr => {
            const celula = tr.querySelector(`[data-col="${coluna}"]`);
            if (!celula) { tr.style.display = "none"; return; }
            let conteudo = celula.textContent.toLowerCase();
            let normalizado = conteudo.replace(/[^0-9a-z]/gi, '');
            tr.style.display = normalizado.includes(texto) ? "" : "none";
        });
    });
    } else if (page === 'agendamentos') {
    content.innerHTML = `
        <h2>Agendamentos</h2>
        <div class="card p-0">
            <table class="table mb-0">
                <thead><tr><th>ID</th><th>Cliente</th><th>Serviço</th><th>Data</th><th>Status</th><th></th></tr></thead>
                <tbody id="agendaAbertosTable"></tbody>
            </table>
        </div>
    `;
    // Carrega agendamentos ABERTOS
    loadAgendamentosAbertos();
    } else if (page === 'servicos') {
    content.innerHTML = `
        <h2>Meus Serviços</h2>
        <div class="mb-3 text-end">
            <button class="btn btn-primary" id="btnGerenciarServico" disabled>Gerenciar Serviço</button>
        </div>
        <div class="card p-0">
            <table class="table mb-0">
                <thead><tr><th>ID</th><th>Cliente</th><th>Serviço</th><th>Data</th><th>Status</th></tr></thead>
                <tbody id="agendaAtivosTable"></tbody>
            </table>
        </div>
    `;
    const btn = document.getElementById('btnGerenciarServico');
    if (btn) btn.addEventListener('click', () => { openGerenciarServicoModal(); });
    loadAgendamentosAtivos();
    }
}

// Funções globais de API e carregamento para as abas do mecânico
async function fetchAuth(path, opts={}) {
    const token = localStorage.getItem('userToken') || '';
    const res = await fetch(`${window.API_BASE_URL}${path}`, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) } });
    if (!res.ok) {
        const data = await res.json().catch(()=>({}));
        throw new Error(data.error || data.message || 'Falha na requisição');
    }
    return res.json();
}

async function loadAgendamentosAbertos() {
    try {
        const rows = await fetchAuth('/agendamentos/abertos');
        const tbody = document.getElementById('agendaAbertosTable');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (!Array.isArray(rows) || rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Nenhum agendamento aberto.</td></tr>';
            return;
        }
        rows.forEach(item => {
            const dt = item.dataagendada ? new Date(item.dataagendada).toLocaleString() : '-';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.id}</td>
                <td>${item.cliente_nome || '-'}</td>
                <td>${item.servico_nome || '-'}</td>
                <td>${dt}</td>
                <td>${item.status}</td>
                <td class="text-end"><button class="btn btn-sm btn-success" data-id="${item.id}">Assumir</button></td>
            `;
            tr.querySelector('button').addEventListener('click', async () => {
                try {
                    await fetchAuth(`/agendamentos/${item.id}/assumir`, { method: 'PUT' });
                    loadAgendamentosAbertos();
                    const ativosTbody = document.getElementById('agendaAtivosTable');
                    if (ativosTbody) loadAgendamentosAtivos();
                } catch (e) { alert(e.message); }
            });
            tbody.appendChild(tr);
        });
    } catch (e) {
        const tbody = document.getElementById('agendaAbertosTable');
        if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center">${e.message}</td></tr>`;
    }
}

async function loadAgendamentosAtivos() {
    try {
        const rows = await fetchAuth('/agendamentos/ativos');
        const tbody = document.getElementById('agendaAtivosTable');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (!Array.isArray(rows) || rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Nenhum serviço em andamento.</td></tr>';
            return;
        }
        window.meusAtivosMap = {};
        rows.forEach(item => {
            const dt = item.dataagendada ? new Date(item.dataagendada).toLocaleString() : '-';
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', item.id);
            tr.style.cursor = 'pointer';
            tr.innerHTML = `
                <td>${item.id}</td>
                <td>${item.cliente_nome || '-'}</td>
                <td>${item.servico_nome || '-'}</td>
                <td>${dt}</td>
                <td>${item.status}</td>
            `;
            tr.addEventListener('click', () => setSelectedServico(item.id));
            tbody.appendChild(tr);
            window.meusAtivosMap[item.id] = item;
        });
    } catch (e) {
        const tbody = document.getElementById('agendaAtivosTable');
        if (tbody) tbody.innerHTML = `<tr><td colspan="5" class="text-danger text-center">${e.message}</td></tr>`;
    }
}

function setSelectedServico(id) {
    const tbody = document.getElementById('agendaAtivosTable');
    if (!tbody) return;
    Array.from(tbody.querySelectorAll('tr')).forEach(tr => tr.classList.remove('table-active'));
    const row = tbody.querySelector(`tr[data-id="${id}"]`);
    if (row) row.classList.add('table-active');
    window.selectedAgendamentoId = id;
    const btn = document.getElementById('btnGerenciarServico');
    if (btn) btn.disabled = !id;
}

function openGerenciarServicoModal() {
    const id = window.selectedAgendamentoId;
    if (!id) { alert('Selecione um serviço na lista.'); return; }
    const item = (window.meusAtivosMap || {})[id];
    if (!item) { alert('Não foi possível carregar os dados do serviço.'); return; }
    const dt = item.dataagendada ? new Date(item.dataagendada).toLocaleString() : '-';
    document.getElementById('gsId').textContent = item.id;
    document.getElementById('gsCliente').textContent = item.cliente_nome || '-';
    document.getElementById('gsServico').textContent = item.servico_nome || '-';
    document.getElementById('gsData').textContent = dt;
    document.getElementById('gsStatus').textContent = item.status || '-';
    document.getElementById('gsObs').textContent = item.observacoes || '';
    const modalEl = document.getElementById('modalGerenciarServico');
    const modal = new bootstrap.Modal(modalEl);
    // Carrega produtos para o datalist (uma vez por abertura)
    loadProdutosDatalist();
    // Carrega itens já usados
    loadItensAgendamento(id);
    // Liga botão adicionar
    const btnAdd = document.getElementById('btnAddPeca');
    if (btnAdd && !btnAdd.hasListener) {
        btnAdd.addEventListener('click', onAddItemPeca);
        btnAdd.hasListener = true;
    }
    // Liga botão finalizar
    const btnFinalizar = document.getElementById('btnFinalizarServico');
    if (btnFinalizar && !btnFinalizar.hasListener) {
        btnFinalizar.addEventListener('click', onFinalizarServico);
        btnFinalizar.hasListener = true;
    }
    modal.show();
}

async function loadProdutosDatalist() {
    const dl = document.getElementById('produtosDatalist');
    if (!dl) return;
    if (dl.getAttribute('data-loaded') === '1') return; // cache simples
    try {
        const token = localStorage.getItem('userToken') || '';
        const res = await fetch(`${window.API_BASE_URL}/produtos`, { headers: { 'Authorization': `Bearer ${token}` }});
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || 'Falha ao carregar produtos');
        const produtos = Array.isArray(payload.data) ? payload.data : [];
        window._produtosCache = produtos;
        dl.innerHTML = produtos.map(p => `<option value="${p.nome} (ID #${p.idProduto}) - Estoque: ${p.qtd}"></option>`).join('');
        dl.setAttribute('data-loaded','1');
    } catch (e) { console.warn(e.message); }
}

function parseProdutoInput(str) {
    // espera formato: Nome (ID #123) - Estoque: N
    const m = str && str.match(/#(\d+)/);
    const id = m ? Number(m[1]) : NaN;
    return isNaN(id) ? null : id;
}

async function onAddItemPeca(e) {
    e.preventDefault();
    const id = window.selectedAgendamentoId;
    const input = document.getElementById('gsProdutoInput');
    const qtdEl = document.getElementById('gsQtd');
    const idproduto = parseProdutoInput(input.value);
    const quantidade = Number(qtdEl.value || 1);
    if (!idproduto) { alert('Selecione um produto válido.'); return; }
    if (quantidade <= 0) { alert('Quantidade inválida.'); return; }
    try {
        await fetchAuth(`/agendamentos/${id}/itens`, { method: 'POST', body: JSON.stringify({ idproduto, quantidade }) });
        input.value = '';
        qtdEl.value = '1';
        await loadItensAgendamento(id);
        // Também atualiza cache de produtos/estoque na UI se desejar
    } catch (e) {
        alert(e.message);
    }
}

async function loadItensAgendamento(agendamentoId) {
    try {
        const rows = await fetchAuth(`/agendamentos/${agendamentoId}/itens`);
        const tbody = document.querySelector('#gsItensTable tbody');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (!Array.isArray(rows) || rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhuma peça usada registrada.</td></tr>';
            return;
        }
        rows.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r.id}</td><td>${r.nome || ('#'+r.idproduto)}</td><td>${r.quantidade}</td><td class="text-end"><button class="btn btn-sm btn-outline-danger" data-remove="${r.id}">Remover</button></td>`;
            const btn = tr.querySelector('button[data-remove]');
            if (btn) {
                btn.addEventListener('click', async () => {
                    try {
                        await fetchAuth(`/agendamentos/${agendamentoId}/itens/${r.id}`, { method: 'DELETE' });
                        await loadItensAgendamento(agendamentoId);
                    } catch (e) {
                        alert(e.message || 'Falha ao remover item.');
                    }
                });
            }
            tbody.appendChild(tr);
        });
    } catch (e) {
        const tbody = document.querySelector('#gsItensTable tbody');
        if (tbody) tbody.innerHTML = `<tr><td colspan="4" class="text-danger text-center">${e.message}</td></tr>`;
    }
}

async function onFinalizarServico(e) {
    e.preventDefault();
    const id = window.selectedAgendamentoId;
    if (!id) { alert('Nenhum serviço selecionado.'); return; }
    if (!confirm('Finalizar este serviço e enviar para pagamento?')) return;
    try {
        await fetchAuth(`/agendamentos/${id}/finalizar`, { method: 'PUT' });
        alert('Serviço finalizado com sucesso!');
        const modalEl = document.getElementById('modalGerenciarServico');
        const modal = bootstrap.Modal.getInstance(modalEl);
        if (modal) modal.hide();
        await loadAgendamentosAtivos();
    } catch (e) {
        alert(e.message || 'Falha ao finalizar serviço.');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    checkAndShowChangePasswordModal();
    loadPage('dashboard');

    document.querySelectorAll('.sidebar a[data-page]').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = e.target.closest('a').dataset.page;
            if (page) {
                document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
                e.target.closest('a').classList.add('active');
                loadPage(page);
            }
        });
    });

    // Adiciona nova aba Serviços no menu
    const sidebar = document.querySelector('.sidebar');
    if (sidebar && !sidebar.querySelector('a[data-page="servicos"]')) {
        const a = document.createElement('a');
        a.href = '#';
        a.dataset.page = 'servicos';
        a.innerHTML = '<i class="fas fa-wrench me-2"></i>Serviços';
        a.addEventListener('click', (e) => { e.preventDefault(); document.querySelectorAll('.sidebar a').forEach(x=>x.classList.remove('active')); a.classList.add('active'); loadPage('servicos'); });
        sidebar.insertBefore(a, sidebar.querySelector('.logout-btn'));
    }

    // Usando funções globais para carregar grids
    window.addEventListener('mustChangePassword', (event) => {
        const modalEl = document.getElementById('modalTrocarSenha');
        if (!modalEl) return;
        const modal = new bootstrap.Modal(modalEl, { backdrop: 'static', keyboard: false });
        modal.show();

        const btnSubmit = document.getElementById('btnTrocarSenha');
        if (btnSubmit && !btnSubmit.hasListener) {
            btnSubmit.addEventListener('click', async (e) => {
                e.preventDefault();
                const ns = document.getElementById('novaSenha').value;
                const cs = document.getElementById('confirmaSenha').value;
                const status = document.getElementById('trocaSenhaStatus');
                status.textContent = '';
                if (!ns || ns.length < 6) { status.textContent = 'Senha deve ter ao menos 6 caracteres.'; status.className = 'text-danger'; return; }
                if (ns !== cs) { status.textContent = 'As senhas não coincidem.'; status.className = 'text-danger'; return; }
                try {
                    await fetchAuthenticated('/usuarios/me/trocar-senha', 'PUT', { senha: ns });
                    status.textContent = 'Senha alterada com sucesso.'; status.className = 'text-success';
                    localStorage.setItem('mustChangePassword','0');
                    setTimeout(() => modal.hide(), 1000);
                } catch (err) {
                    status.textContent = err.message || 'Falha ao alterar senha.'; status.className = 'text-danger';
                }
            });
            btnSubmit.hasListener = true;
        }
    });
});
</script>

<div class="modal fade" id="modalTrocarSenha" tabindex="-1" aria-labelledby="modalTrocarSenhaLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title" id="modalTrocarSenhaLabel">Trocar Senha - Primeiro Acesso</h5>
      </div>
      <div class="modal-body">
        <p>Como este é seu primeiro acesso, por favor escolha uma nova senha para continuar.</p>
        <div class="mb-3">
          <label class="form-label">Nova senha</label>
          <input type="password" id="novaSenha" class="form-control" minlength="6" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirme a nova senha</label>
          <input type="password" id="confirmaSenha" class="form-control" minlength="6" required>
        </div>
        <div id="trocaSenhaStatus" class="mt-2"></div>
      </div>
      <div class="modal-footer">
        <button id="btnTrocarSenha" class="btn btn-primary">Alterar Senha</button>
      </div>
    </div>
  </div>
</div>
