<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>SixBikes Bicicletaria - Registrar</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" href="assets/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.ico">

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/templatemo.css">
    <link rel="stylesheet" href="assets/css/custom.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
        }

        .registro-box {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
        }
        
        .btn-success {
            background-color: #59ab6e;
            border-color: #59ab6e;
        }
        .btn-success:hover {
            background-color: #46915a;
            border-color: #46915a;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light shadow">
        </nav>
    <div class="container">
        <div class="registro-box position-relative">
            <a href="index.html" class="btn btn-sm btn-outline-success position-absolute top-0 end-0 m-2" title="Voltar para Home">
                &larr; Home
            </a>
            <h2 class="text-success text-center">Registrar-se</h2>
            <form id="registroForm">
                <div class="row g-3">
                    <div class="col-md-12">
                        <label for="regNome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="regNome" name="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="col-md-6">
                        <label for="regCpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="regCpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="col-md-6">
                        <label for="regTelefone" class="form-label">Telefone</label>
                        <input type="text" class="form-control" id="regTelefone" name="telefone" placeholder="(99) 99999-9999">
                    </div>
                    <div class="col-md-12">
                        <label for="regEmail" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="regEmail" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="col-md-6">
                        <label for="regSenha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="regSenha" name="senha" placeholder="mínimo 6 caracteres" minlength="6" required>
                    </div>
                    <div class="col-md-6">
                        <label for="regConfirmaSenha" class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" id="regConfirmaSenha" name="confirmarSenha" placeholder="Digite novamente" required>
                    </div>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success">Registrar</button>
                </div>
                <div class="mt-3 text-center">
                    Já possui conta?
                    <a href="login.html" class="text-decoration-none">Entrar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/jquery-1.11.0.min.js"></script>
    <script src="assets/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script> 
    <script>
        document.getElementById('registroForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            const form = event.target;
            const senha = document.getElementById('regSenha').value;
            if (String(senha).length < 6) { alert('A senha deve conter pelo menos 6 caracteres.'); return; }
            
            if (senha !== document.getElementById('regConfirmaSenha').value) { 
                alert('As senhas não coincidem!'); 
                return; 
            }

            const dados = { 
                nome: form.regNome.value, 
                email: form.regEmail.value, 
                senha: senha, 
                cpf: form.regCpf.value, 
                telefone: form.regTelefone.value 
            };

            try {
                // Chama a rota POST /api/clientes/registro
                const response = await fetch(`${API_BASE_URL}/clientes/registro`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(dados) 
                });
                const result = await response.json();
                
                // Trata erro de duplicidade de email (RF013)
                if (!response.ok) { 
                    throw new Error(result.error || 'Falha ao registrar.'); 
                }

                alert('Registro concluído! Agora Faça login.');
                window.location.href = 'login.html';
            } catch (error) { 
                alert('Erro: ' + error.message); 
            }
        });
    </script>
</body>
</html>
